name: Snapshot Build
on:
  push:
    # This snapshot build should only happen on pushes to the snapshot branch.
    branches:
      - snapshot
  pull_request:
    # This snapshot build should NOT happen on pull requests.
    # Therefore, we explicitly exclude all branches for pull requests.
    branches-ignore:
      - '*'

env:
  LC_ALL: en_US.UTF-8
  GRADLE_OPTS: >-
    -Dorg.gradle.parallel=true

defaults:
  run:
    shell: bash

jobs:
  snapshot:
    name: Gradle Snapshot Build
    runs-on: ubuntu-latest
    env:
      CS_PASSWORD: ${{secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD}}
      CS_USERNAME: ${{secrets.CENTRAL_SONATYPE_TOKEN_USERNAME}}
      GPG_PASSPHRASE: ${{secrets.GPG_PASSPHRASE}}
      GPG_KEY_ID: ${{secrets.GPG_KEY_ID}}
      GPG_PRIVATE_KEY: ${{secrets.GPG_PRIVATE_KEY}}
      DO_RELEASE: false
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        cache: "gradle"
        java-version: 21
    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
    - name: Gradle version
      run: ./gradlew --no-daemon --version
    - name: Setup GPG and jp environment
      run: |
        sudo apt-get update && sudo apt-get install -y gnupg2 jp
        echo "$GPG_PRIVATE_KEY" > private.key
        echo "$GPG_PASSPHRASE" | gpg --batch --passphrase-fd 0 --pinentry-mode loopback --no-tty --quiet --yes --import private.key
        rm private.key
      shell: bash 
    - name: Build with Gradle
      run: ./gradlew release --info
    - name: Delete GPG key from keyring
      if: always()
      run: |
        rm -rf ~/.gnupg
      shell: bash

  # Build the documentation — only after a successful snapshot build, so the
  # site is never published from a broken branch.
  docs:
    name: Build documentation
    needs: snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
      with:
        # Full history so VitePress `lastUpdated` git timestamps are accurate.
        fetch-depth: 0
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: docs-site/package-lock.json
    - name: Install dependencies
      working-directory: docs-site
      run: npm ci
    - name: Build docs
      working-directory: docs-site
      env:
        # Publishes to /fennec.bnd.libraries/<branch>/ (see docs-site config.mts).
        DOCS_BRANCH: ${{ github.ref_name }}
      run: npm run docs:build
    - name: Assemble site slice
      run: |
        mkdir -p site/${{ github.ref_name }}
        cp -r docs-site/docs/.vitepress/dist/. site/${{ github.ref_name }}/
        # Root redirect so the bare Pages URL lands on the built branch.
        printf '<!doctype html><meta http-equiv="refresh" content="0; url=./%s/">\n' "${{ github.ref_name }}" > site/index.html
        touch site/.nojekyll
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: site

  # Deploy the documentation to GitHub Pages — only after a successful docs build.
  deploy:
    name: Deploy documentation
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v4