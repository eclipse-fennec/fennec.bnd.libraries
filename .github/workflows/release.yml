name: CI Build
on:
  push:
    # This release should only happen on pushes to the snapshot or main branches.
    branches:
      - main
  pull_request:
    # This release should NOT happen on pull requests.
    # Therefore, we explicitly exclude all branches for pull requests.
    branches-ignore:
      - '*'

env:
  LC_ALL: en_US.UTF-8
  GRADLE_OPTS: >-
    -Dorg.gradle.parallel=true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Gradle Release Build
    runs-on: ubuntu-latest
    env:
      CS_PASSWORD: ${{secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD}}
      CS_USERNAME: ${{secrets.CENTRAL_SONATYPE_TOKEN_USERNAME}}
      GPG_PASSPHRASE: ${{secrets.GPG_PASSPHRASE}}
      GPG_KEY_ID: ${{secrets.GPG_KEY_ID}}
      GPG_PRIVATE_KEY: ${{secrets.GPG_PRIVATE_KEY}}
      DO_RELEASE: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        cache: "gradle"
        java-version: 21
    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
    - name: Gradle version
      run: ./gradlew --no-daemon --version
    - name: Setup GPG and jp environment
      run: |
        sudo apt-get update && sudo apt-get install -y gnupg2 jp
        echo "$GPG_PRIVATE_KEY" > private.key
        echo "$GPG_PASSPHRASE" | gpg --batch --passphrase-fd 0 --pinentry-mode loopback --no-tty --quiet --yes --import private.key
        rm private.key
      shell: bash 
    - name: Build with Gradle
      run: ./gradlew release --info
    - name: Upload release OBR
      # The release run also populated the local Release OBR (cnf/release) —
      # the exact bundles that went to Sonatype.
      uses: actions/upload-artifact@v4
      with:
        name: release-obr
        path: cnf/release
        if-no-files-found: error
    - name: Delete GPG key from keyring
      if: always()
      run: |
        rm -rf ~/.gnupg
      shell: bash

  # Publish the release OBR — the exact bundles the build job released to
  # Sonatype, taken from its artifact. Force-pushed as a single-commit orphan
  # branch 'release-obr' (baselining only ever needs the latest release),
  # reachable at
  # https://raw.githubusercontent.com/eclipse-fennec/fennec.bnd.libraries/release-obr/index.xml
  obr:
    name: Publish release OBR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download release OBR
      uses: actions/download-artifact@v4
      with:
        name: release-obr
        path: obr
    - name: Verify the OBR is populated
      run: |
        count=$(grep -c '<resource' obr/index.xml || true)
        echo "OBR contains $count resources"
        test "$count" -gt 0
    - name: Push OBR to the release-obr branch
      run: |
        cd obr
        git init -b release-obr
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Release OBR for ${GITHUB_SHA}"
        git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" release-obr
