name: Documentation

on:
  # Manual rebuild only. The automatic docs build + Pages deploy runs as gated
  # jobs in snapshot.yml (after a successful build), so the documentation is
  # never published unless the build succeeded.
  workflow_dispatch:

# Read-only by default; the deploy job escalates to the Pages scopes it needs.
permissions:
  contents: read

# Never cancel an in-flight Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  LC_ALL: en_US.UTF-8

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
      with:
        # Full history so VitePress `lastUpdated` git timestamps are accurate.
        fetch-depth: 0
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: docs-site/package-lock.json
    - name: Install dependencies
      working-directory: docs-site
      run: npm ci
    - name: Build docs
      working-directory: docs-site
      env:
        # Publishes to /fennec.bnd.libraries/<branch>/ (see docs-site config.mts).
        DOCS_BRANCH: ${{ github.ref_name }}
      run: npm run docs:build
    - name: Assemble site slice
      run: |
        mkdir -p site/${{ github.ref_name }}
        cp -r docs-site/docs/.vitepress/dist/. site/${{ github.ref_name }}/
        # Root redirect so the bare Pages URL lands on the built branch.
        printf '<!doctype html><meta http-equiv="refresh" content="0; url=./%s/">\n' "${{ github.ref_name }}" > site/index.html
        touch site/.nojekyll
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Pages deployments replace the ENTIRE site. Only the snapshot branch may
    # deploy for now — a dispatch from another branch would publish its slice
    # and wipe /snapshot/. Remove this guard once the deploy assembles all
    # published versions.
    if: github.ref == 'refs/heads/snapshot'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v4
